<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 塔羅占卜 - 極致穩定版</title>
    <style>
        :root { --gold: #d4af37; --bg: #0d0d15; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 700px; text-align: center; }
        .input-group { background: #1a1a2e; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 20px; }
        textarea { width: 100%; height: 60px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        button { margin-top: 15px; background: var(--gold); border: none; padding: 12px; font-weight: bold; border-radius: 25px; cursor: pointer; width: 100%; transition: 0.3s; }
        button:disabled { background: #333; color: #666; }
        
        .card-container { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        .card { width: 110px; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 5px; position: relative; }
        .card img { width: 100%; height: auto; border-radius: 4px; display: block; min-height: 150px; background: #000 url('https://i.gifer.com/ZZ5H.gif') center/20px no-repeat; }
        .card.upright img { transform: rotate(0deg); }
        .card.reversed img { transform: rotate(180deg); }
        .card-info { font-size: 0.75rem; margin-top: 5px; color: var(--gold); }

        #reading { text-align: left; background: #1a1a2e; padding: 20px; border-radius: 15px; line-height: 1.8; display: none; margin-top: 20px; border-left: 5px solid var(--gold); }
        .ai-text { white-space: pre-wrap; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color:var(--gold)">🔮 無印塔羅</h1>
    
    <div class="input-group">
        <textarea id="userQuestion" placeholder="請輸入您的疑惑... (若不輸入則視為綜合占卜)"></textarea>
        <button id="drawBtn">誠心抽牌</button>
    </div>

    <div class="card-container" id="cardContainer"></div>
    <div id="reading"><div id="content" class="ai-text"></div></div>
</div>

<script>
    const API_KEY = "AIzaSyBL8Oslnm5_cLT39HsTcIEY8c_qeQwVCq8";
    
    // 使用維基百科 FilePath 介面，這是最穩定的直連方式
    const tarotList = [
        "RWS_Tarot_00_Fool.jpg", "RWS_Tarot_01_Magician.jpg", "RWS_Tarot_02_High_Priestess.jpg",
        "RWS_Tarot_03_Empress.jpg", "RWS_Tarot_04_Emperor.jpg", "RWS_Tarot_05_Hierophant.jpg",
        "RWS_Tarot_06_Lovers.jpg", "RWS_Tarot_07_Chariot.jpg", "RWS_Tarot_08_Strength.jpg",
        "RWS_Tarot_09_Hermit.jpg", "RWS_Tarot_10_Wheel_of_Fortune.jpg", "RWS_Tarot_11_Justice.jpg",
        "RWS_Tarot_12_Hanged_Man.jpg", "RWS_Tarot_13_Death.jpg", "RWS_Tarot_14_Temperance.jpg",
        "RWS_Tarot_15_Devil.jpg", "RWS_Tarot_16_Tower.jpg", "RWS_Tarot_17_Star.jpg",
        "RWS_Tarot_18_Moon.jpg", "RWS_Tarot_19_Sun.jpg", "RWS_Tarot_20_Judgement.jpg",
        "RWS_Tarot_21_World.jpg"
    ];
    const cardNames = ["愚者", "魔術師", "女教皇", "女皇", "皇帝", "教皇", "戀人", "戰車", "力量", "隱士", "命運之輪", "正義", "倒吊人", "死神", "節制", "惡魔", "高塔", "星星", "月亮", "太陽", "審判", "世界"];

    const drawBtn = document.getElementById('drawBtn');
    const cardContainer = document.getElementById('cardContainer');
    const contentDiv = document.getElementById('content');

    // 強力載入函式：失敗會不斷重試
    function persistentLoad(imgElement, fileName, attempt = 1) {
        const url = `https://commons.wikimedia.org/wiki/Special:FilePath/${fileName}?width=300`;
        imgElement.src = url;

        imgElement.onerror = () => {
            console.log(`載入 ${fileName} 失敗，第 ${attempt} 次重試...`);
            setTimeout(() => {
                persistentLoad(imgElement, fileName, attempt + 1);
            }, 2000); // 失敗後隔 2 秒重試
        };
        
        imgElement.onload = () => {
            imgElement.style.background = "none"; // 載入成功移除 loading 動畫
        };
    }

    async function drawAndInterpret() {
        const question = document.getElementById('userQuestion').value || "我的綜合運勢";
        drawBtn.disabled = true;
        cardContainer.innerHTML = '';
        document.getElementById('reading').style.display = 'block';
        contentDiv.innerHTML = '<span style="color:var(--gold)">🕯️ 正在連結能量並載入牌陣，請稍候...</span>';

        let deckIndices = Array.from(Array(22).keys());
        let selected = [];
        for (let i = 0; i < 5; i++) {
            let idx = deckIndices.splice(Math.floor(Math.random() * deckIndices.length), 1)[0];
            let isUpright = Math.random() > 0.3;
            selected.push({ id: idx, name: cardNames[idx], file: tarotList[idx], state: isUpright ? "正位" : "逆位" });
        }

        // 渲染 HTML
        selected.forEach(card => {
            const cardHtml = `
                <div class="card ${card.state === '正位' ? 'upright' : 'reversed'}">
                    <img id="img-${card.id}" alt="${card.name}">
                    <div class="card-info">${card.name}<br>(${card.state})</div>
                </div>`;
            cardContainer.insertAdjacentHTML('beforeend', cardHtml);
            // 執行持久載入
            persistentLoad(document.getElementById(`img-${card.id}`), card.file);
        });

        const prompt = `你是一位精通神祕學的塔羅大師。使用者問：「${question}」。
        抽中牌陣：${selected.map(c => c.name + "(" + c.state + ")").join(", ")}。
        請針對問題進行深度解析並給予具體建議。請用繁體中文回答，段落分明。`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;
            contentDiv.innerHTML = `<h3 style="color:var(--gold);margin:0 0 10px 0;">🔮 大師啟示</h3>` + text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        } catch (e) {
            contentDiv.innerText = "能量連線中斷，請檢查網路後再次求問。";
        } finally {
            drawBtn.disabled = false;
        }
    }

    drawBtn.addEventListener('click', drawAndInterpret);
</script>
</body>
</html>
